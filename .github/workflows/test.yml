name: Test Workflow

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Cache node modules
        uses: actions/cache@v3
        with:
          path: node_modules
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: services/quant-python/poetry.lock

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.22'

      - name: Set up Rust
        uses: actions/setup-rust@v1
        with:
          rust-version: '1.75'
          components: 'cargo'

      - name: Cache Rust
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/
            services/executor-rust/target/
          key: ${{ runner.os }}-rust-${{ hashFiles('services/executor-rust/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-rust-

      - name: Install Foundry
        uses: foundry-rs/foundry-action@v1
        with:
          version: 'latest'
          install-git-hooks: false
          install-hooks: false

      - name: Install Rust dependencies
        run: |
          cd services/executor-rust
          cargo build

      - name: Install Go dependencies
        run: |
          cd services/gateway-go
          go mod download

      - name: Install Python dependencies
        run: |
          cd services/quant-python
          poetry install

      - name: Run Contract Tests
        run: |
          cd contracts
          forge test

      - name: Run Linting
        run: |
          cd services/executor-rust
          cargo clippy -- -D warnings
          cd ../gateway-go
          golangci-lint run
          cd ../quant-python
          poetry run ruff check .
          poetry run mypy src/

      - name: Build Docker Images
        run: |
          $(MAKE) build

      - name: Verify Build
        run: |
          docker image ls | grep mev-system